project:
  name: "Learn From Basics - LFB"
  task: "mlm"
  dataset: "8Opt/bert-mlm-experiments-en"

model:
  vocab_size: 30522
  hidden_size: 768
  num_hidden_layers: 2
  num_attention_heads: 2
  intermediate_size: 3072
  hidden_dropout_prob: 0.3
  attention_probs_dropout_prob: 0.3
  max_position_embeddings: 512
  type_vocab_size: 2
  initializer_range: 0.02
  layer_norm_eps: 1.0e-12

  # Supported position_embedding_types:
  # - "absolute"
  # - "fixed"
  # - "learned"
  # - "learnable"
  # - "tape"
  # - "rotary" (or "rope")
  # - "relative"
  # - "alibi"
  position_embedding_type: "absolute"

  pad_token_id: 0
  pre_layer_norm: false

tokenizer:
  name: "bert-base-uncased"
  padding: "max_length"
  truncation: true
  max_length: 512

training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  seed: 18210
  eval_steps: 100
  save_steps: 200
  checkpoint_dir: "./checkpoints"
  use_wandb: true
  wandb_project: "LFB-Evaluate-Positional-Encoding"
  wandb_entity: "mlou"
  wandb_run_name: "LFB-Masked-Language-Modeling"
  save_best: true
  save_last: true

logging:
  level: "info"
